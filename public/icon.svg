<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0F1D36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square - dark navy, original color -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Table grid icon -->
  <rect x="20" y="24" width="68" height="54" rx="4" ry="4" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <!-- Header row fill -->
  <rect x="20" y="24" width="68" height="15" rx="4" ry="0" fill="url(#accent)" opacity="0.2"/>
  <line x1="20" y1="39" x2="88" y2="39" stroke="url(#accent)" stroke-width="2"/>
  <!-- Row lines -->
  <line x1="20" y1="53" x2="88" y2="53" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="65" x2="88" y2="65" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <!-- Column lines -->
  <line x1="43" y1="24" x2="43" y2="78" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="66" y1="24" x2="66" y2="78" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <!-- Header labels -->
  <rect x="26" y="29" width="11" height="4" rx="2" fill="#38BDF8" opacity="0.7"/>
  <rect x="49" y="29" width="11" height="4" rx="2" fill="#38BDF8" opacity="0.7"/>
  <rect x="72" y="29" width="11" height="4" rx="2" fill="#38BDF8" opacity="0.7"/>
  <!-- Data rows - subtle content indicators -->
  <rect x="26" y="44" width="8" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <rect x="49" y="44" width="12" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <rect x="72" y="44" width="6" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <rect x="26" y="57" width="11" height="3" rx="1.5" fill="white" opacity="0.15"/>
  <rect x="49" y="57" width="8" height="3" rx="1.5" fill="white" opacity="0.15"/>
  <rect x="72" y="57" width="10" height="3" rx="1.5" fill="white" opacity="0.15"/>
  <!-- Query/search badge (bottom right) -->
  <circle cx="96" cy="82" r="22" fill="#1B2A4A"/>
  <circle cx="96" cy="82" r="19" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <!-- Magnifying glass -->
  <circle cx="92" cy="78" r="7" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="97" y1="83" x2="103" y2="89" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- TBL text at bottom -->
  <text x="54" y="104" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="white" letter-spacing="2" opacity="0.9">TB</text>
</svg>
